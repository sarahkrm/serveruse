<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core gestion</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google API Client Library -->
  <script src="https://accounts.google.com/gsi/client"></script>
<script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
  <div class="container">
    <h1>🔧 Core gestion</h1>

    <!-- Bouton de connexion/déconnexion -->
    <div class="auth-container">
      <button id="authorize-button" class="login-btn">Log in with Google</button>
      <button id="signout-button" class="logout-btn hidden">Log out</button>
      <span id="user-info" class="hidden"></span>
    </div>

    <!-- Formulaire pour le nom de l'utilisateur -->
    <div class="user-form">
      <label for="userName">Your name :</label>
      <input type="text" id="userName" placeholder="Ex: Jean-Eude">
    </div>

    <!-- Catégories de cores -->
    <div class="categories">
      <div class="category">
        <h2>Cores 0-23</h2>
        <label>
          <input type="checkbox" class="utilise-checkbox" data-cores="cores 0-23">
          Use
        </label>
        <label>
          <input type="checkbox" class="besoin-checkbox" data-cores="cores 0-23">
          Core need
        </label>
        <div class="user-input hidden" data-cores="cores 0-23">
          <input type="text" placeholder="Votre nom" class="user-name-input">
          <button class="start-btn" data-cores="cores 0-23">Start</button>
        </div>
        <div class="timer" data-cores="cores 0-23">Time : 00:00:00</div>
        <div class="besoin-email hidden" data-cores="cores 0-23">
          <input type="email" placeholder="Votre email" class="email-input">
          <button class="besoin-btn" data-cores="cores 0-23">Need confirmation</button>
        </div>
      </div>

      <div class="category">
        <h2>Cores 24-47</h2>
        <label>
          <input type="checkbox" class="utilise-checkbox" data-cores="cores 24-47">
          Use
        </label>
        <label>
          <input type="checkbox" class="besoin-checkbox" data-cores="cores 24-47">
          Core need
        </label>
        <div class="user-input hidden" data-cores="cores 24-47">
          <input type="text" placeholder="Votre nom" class="user-name-input">
          <button class="start-btn" data-cores="cores 24-47">Start</button>
        </div>
        <div class="timer" data-cores="cores 24-47">Time : 00:00:00</div>
        <div class="besoin-email hidden" data-cores="cores 24-47">
          <input type="email" placeholder="Votre email" class="email-input">
          <button class="besoin-btn" data-cores="cores 24-47">Need confirmation</button>
        </div>
      </div>

      <div class="category">
        <h2>Cores 48-71</h2>
        <label>
          <input type="checkbox" class="utilise-checkbox" data-cores="cores 48-71">
          Use
        </label>
        <label>
          <input type="checkbox" class="besoin-checkbox" data-cores="cores 48-71">
          Core need
        </label>
        <div class="user-input hidden" data-cores="cores 48-71">
          <input type="text" placeholder="Votre nom" class="user-name-input">
          <button class="start-btn" data-cores="cores 48-71">Start</button>
        </div>
        <div class="timer" data-cores="cores 48-71">Time : 00:00:00</div>
        <div class="besoin-email hidden" data-cores="cores 48-71">
          <input type="email" placeholder="Votre email" class="email-input">
          <button class="besoin-btn" data-cores="cores 48-71">Need confirmation</button>
        </div>
      </div>

      <div class="category">
        <h2>Cores 72-95</h2>
        <label>
          <input type="checkbox" class="utilise-checkbox" data-cores="cores 72-95">
          Use
        </label>
        <label>
          <input type="checkbox" class="besoin-checkbox" data-cores="cores 72-95">
          Core need
        </label>
        <div class="user-input hidden" data-cores="cores 72-95">
          <input type="text" placeholder="Votre nom" class="user-name-input">
          <button class="start-btn" data-cores="cores 72-95">Start</button>
        </div>
        <div class="timer" data-cores="cores 72-95">Time : 00:00:00</div>
        <div class="besoin-email hidden" data-cores="cores 72-95">
          <input type="email" placeholder="Votre email" class="email-input">
          <button class="besoin-btn" data-cores="cores 72-95">Need confirmation</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
